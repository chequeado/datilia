volumes:
  db_data:

services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file: .env
    environment:
      DATA360_API_BASE_URL: https://data360api.worldbank.org
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/openapi.json"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - db_data:/app/data
    environment:
      # Override MCP URL to use the internal Docker service name
      MCP_SERVER_URL: http://mcp:8000/mcp
      DATABASE_PATH: /app/data/db.sqlite3
    depends_on:
      mcp:
        condition: service_started
