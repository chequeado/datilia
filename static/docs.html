<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datilia — API Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <style>
    *, body { font-family: 'Archivo', ui-sans-serif, system-ui, sans-serif !important; }
    /* Minimal top bar to carry the Datilia brand */
    #datilia-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: #354052;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #datilia-topbar a { color: inherit; text-decoration: none; }
    #datilia-topbar .brand { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
    #datilia-topbar .nav { display: flex; gap: 16px; font-size: 13px; opacity: 0.85; }
    #datilia-topbar .nav a:hover { opacity: 1; }
    body { margin: 0; padding-top: 48px; }
  </style>
</head>
<body>

  <div id="datilia-topbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="/" class="brand">Datilia</a>
      <span style="font-size:11px;opacity:0.55;font-weight:400;margin-left:4px;">por</span>
      <a href="https://chequeado.com" target="_blank">
        <img src="/static/logo01.png" alt="Chequeado" style="height:14px;width:auto;opacity:0.75;filter:brightness(10);" />
      </a>
    </div>
    <nav class="nav">
      <a href="/">Nueva consulta</a>
      <a href="/history">Historial</a>
      <a href="/docs">Docs</a>
    </nav>
  </div>

  <script
    id="api-reference"
    data-url="/static/openapi.json"
    data-configuration='{
      "theme": "default",
      "layout": "sidebar",
      "defaultHttpClient": {
        "targetKey": "shell",
        "clientKey": "curl"
      },
      "hideDarkModeToggle": false,
      "searchHotKey": "k"
    }'
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

</body>
</html>
